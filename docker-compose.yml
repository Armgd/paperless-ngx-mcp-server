services:
  paperless-mcp:
    build: .
    image: paperless-mcp:latest
    container_name: paperless-mcp
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      PAPERLESS_URL: ${PAPERLESS_URL}
      PAPERLESS_TOKEN: ${PAPERLESS_TOKEN}
      PAPERLESS_TIMEOUT: ${PAPERLESS_TIMEOUT:-30}
      PAPERLESS_VERIFY_SSL: ${PAPERLESS_VERIFY_SSL:-true}
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN}
      MCP_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
      MCP_PATH: /mcp
      MCP_STATELESS: "true"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
